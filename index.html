<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-11 專屬買賣合約產生器 V1.4</title>
    
    <!-- 反快取咒語，強迫瀏覽器抓最新版 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        body { 
            background-color: #f4f7f9; 
            color: #334155; 
            padding-bottom: 100px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .card { 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); 
            border: none; 
            margin-bottom: 24px; 
            padding: 24px; 
        }
        
        .card-header { 
            background-color: transparent; 
            padding: 0 0 16px 0; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #f1f5f9; 
            color: #047857; 
            font-weight: 700; 
            font-size: 1.15rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .header-title { display: flex; align-items: center; }
        .header-line { width: 4px; height: 20px; background-color: #10b981; margin-right: 12px; border-radius: 2px; }
        .card-body { padding: 0; }
        
        .btn-primary { background-color: #059669; border-color: #059669; font-weight: 500; }
        .btn-primary:hover { background-color: #047857; border-color: #047857; }
        .btn-outline-primary { color: #059669; border-color: #059669; font-weight: 500; }
        .btn-outline-primary:hover, .btn-check:checked + .btn-outline-primary { background-color: #059669; color: white; border-color: #059669; }
        
        .form-control, .form-select, .input-group-text { border: 1px solid #cbd5e1; border-radius: 6px; box-shadow: none; transition: all 0.2s; color: #334155; }
        .form-control:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .input-group-text { background-color: #f8fafc; }
        
        .alert-success { background-color: #f0fdf4; color: #166534; border: none; border-radius: 8px; }
        
        .bulk-zone { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; }
        .excel-paste-zone { background-color: #f8fafc; border: 2px dashed #cbd5e1; transition: 0.3s; color: #64748b; font-weight: bold; }
        .excel-paste-zone:focus { background-color: #f0fdf4; border-color: #10b981; outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        
        .remove-btn { color: #ef4444; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .remove-btn:hover { color: #b91c1c; }
        
        .bottom-bar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px); 
            padding: 15px 24px; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06); 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid #f1f5f9; 
        }
        .totals-display { font-size: 1.15rem; font-weight: 700; color: #334155; }
        .text-danger { color: #e11d48 !important; } 
        .text-primary { color: #059669 !important; }
        
        .header-container { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 1.5rem; }
        .manual-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); text-decoration: none; background: #e2e8f0; color: #334155; padding: 6px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; transition: 0.2s; }
        .manual-btn:hover { background: #cbd5e1; color: #1e293b; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="header-container">
        <h2 class="m-0 fw-bold" style="color: #1e293b;">🏪 7-11 專屬買賣合約自動產生器</h2>
        <a href="711_Contract_System_Manual.html" target="_blank" class="manual-btn">📘 維護與更新手冊</a>
    </div>

    <!-- 1. 合約類型 -->
    <div class="card">
        <div class="card-header">
            <div class="header-title"><div class="header-line"></div>1. 選擇合約類型</div>
        </div>
        <div class="card-body">
            <div class="mb-2">
                <label class="form-label fw-bold" style="color:#059669;">請選擇本次要產出的合約類型 (甲乙雙方已預設為統一超商與奕祺行銷)</label>
                <div class="d-flex flex-wrap gap-2">
                    <input type="radio" class="btn-check" name="contractType" id="type1" value="711_return" checked>
                    <label class="btn btn-outline-primary" for="type1">買賣合約書 (可收退)</label>

                    <input type="radio" class="btn-check" name="contractType" id="type2" value="711_firm">
                    <label class="btn btn-outline-primary" for="type2">買賣合約書 (Firm Sale)</label>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. 日期與活動設定 -->
    <div class="card">
        <div class="card-header">
            <div class="header-title"><div class="header-line"></div>2. 日期與活動設定</div>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">本次簽署日</label>
                    <input type="date" id="signDate" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">活動開始日</label>
                    <input type="date" id="eventDate" class="form-control">
                </div>
                <div class="col-md-12">
                    <label class="form-label text-muted small fw-bold">合約商品/活動名稱 (填入第一條空格)</label>
                    <input type="text" id="eventName" class="form-control" value="">
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 買賣標的物與交貨設定 -->
    <div class="card">
        <div class="card-header">
            <div class="header-title"><div class="header-line"></div>3. 買賣標的物與交貨設定</div>
            <button class="btn btn-sm btn-light border fw-bold text-secondary" onclick="addProduct()">＋手動新增一列</button>
        </div>
        <div class="card-body">
            
            <div class="alert alert-success small py-3 mb-3 d-flex align-items-center">
                <span style="font-size: 1.5rem; margin-right: 12px;">💡</span>
                <div>
                    <b>交貨日期/說明 (自由輸入)：</b>已復原至各品項右側！支援填寫「115/08/24」或「一取貨日1-2天前到貨」等文字。<br>
                    為了讓 Word 表格產生「合併儲存格」的漂亮效果，<b>系統只會抓取「第一列」輸入的交貨說明</b>，填入最終合約中！
                </div>
            </div>

            <div class="row g-2 mb-4 align-items-center p-3 bulk-zone mx-0">
                <div class="col-12 col-md-auto fw-bold text-primary mb-2 mb-md-0">⚡ 批次快速套用：</div>
                <div class="col-12 col-md-auto">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">公關品數量</span>
                        <input type="number" id="bulkPrQty" class="form-control" style="max-width: 100px;" placeholder="輸入數量">
                        <button class="btn btn-primary" onclick="applyBulkPrQty()">套用全部</button>
                    </div>
                </div>
                <div class="col-12 col-md-auto mt-2 mt-md-0">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">交貨日期</span>
                        <input type="date" id="bulkDate" class="form-control">
                        <button class="btn btn-primary" onclick="applyBulkDate()">套用全部 (自動轉民國年)</button>
                    </div>
                </div>
                <div class="col-12 col-md-auto mt-2 mt-md-0 ms-md-auto">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text fw-bold">營業稅率 (%)</span>
                        <input type="number" id="taxRate" class="form-control text-center fw-bold text-primary" style="max-width: 80px;" value="5" oninput="calculateTotals()">
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="excelPaste" class="form-control text-center excel-paste-zone py-2" placeholder="📋 多欄位快速匯入區：點擊此處按 Ctrl+V，支援整塊複製貼上">
            </div>

            <div id="productContainer">
                <div class="row g-2 mb-3 align-items-end product-row pb-3 border-bottom">
                    <div class="col-md-3"><label class="form-label text-muted small">品項名稱</label><input type="text" class="form-control p-name" value=""></div>
                    <div class="col-md-2"><label class="form-label text-muted small">數量</label><input type="number" class="form-control p-qty" value="" oninput="calculateTotals()"></div>
                    <div class="col-md-2"><label class="form-label text-muted small">單價(未稅)</label><input type="number" class="form-control p-price" value="" oninput="calculateTotals()"></div>
                    <div class="col-md-2"><label class="form-label text-muted small">公關品數量</label><input type="number" class="form-control p-prQty" value=""></div>
                    <div class="col-md-2"><label class="form-label text-muted small">首批交貨日/說明</label><input type="text" class="form-control p-date" placeholder="日期或文字"></div>
                    <div class="col-md-1 text-center"><span class="remove-btn" onclick="this.closest('.product-row').remove(); calculateTotals();">✖ 刪除</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <div class="totals-display" id="totalDisplay">
        品項: 0 款 | 數量總計: 0 | 未稅總計: $0 | 營業稅: $0 | 💰最低採購總金額(含稅): $0
    </div>
    <button class="btn btn-primary btn-lg rounded-pill px-4" onclick="generateContract()">📥 產生合約 (DOCX)</button>
</div>

<script>
    function applyBulkPrQty() {
        const val = document.getElementById('bulkPrQty').value;
        if (val === "") { alert("請先輸入數量！"); return; }
        document.querySelectorAll('.p-prQty').forEach(input => input.value = val);
    }

    function applyBulkDate() {
        const val = document.getElementById('bulkDate').value;
        if (val === "") { alert("請先選擇日期！"); return; }
        
        // 將 YYYY-MM-DD 轉為民國年 YYY/MM/DD
        const parts = val.split('-');
        const rocYear = parseInt(parts[0]) - 1911;
        const formattedDate = `${rocYear}/${parts[1]}/${parts[2]}`;
        
        document.querySelectorAll('.p-date').forEach(input => input.value = formattedDate);
    }

    document.getElementById('productContainer').addEventListener('keydown', function(e) {
        if (e.key === 'Tab' && e.target.classList.contains('p-date')) {
            const allRows = Array.from(document.querySelectorAll('.product-row'));
            const currentRow = e.target.closest('.product-row');
            
            if (allRows.indexOf(currentRow) === allRows.length - 1) {
                e.preventDefault(); 
                addProduct(); 
                const newRows = document.querySelectorAll('.product-row');
                newRows[newRows.length - 1].querySelector('.p-name').focus();
            }
        }
    });

    document.getElementById('productContainer').addEventListener('paste', function(e) {
        if (e.target.tagName !== 'INPUT') return;
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        if (!pasteData || (!pasteData.includes('\t') && !pasteData.includes('\n'))) return; 
        e.preventDefault(); 
        
        const lines = pasteData.split(/\r\n|\n|\r/).filter(line => line.trim() !== '' || line.includes('\t'));
        if (lines.length === 0) return;
        
        const colClasses = ['p-name', 'p-qty', 'p-price', 'p-prQty', 'p-date'];
        let startColIndex = -1;
        for (let i = 0; i < colClasses.length; i++) {
            if (e.target.classList.contains(colClasses[i])) { startColIndex = i; break; }
        }
        if (startColIndex === -1) return;
        
        const startRowElement = e.target.closest('.product-row');
        const allRows = Array.from(document.querySelectorAll('.product-row'));
        const startRowIndex = allRows.indexOf(startRowElement);

        lines.forEach((line, i) => {
            let currentRowIndex = startRowIndex + i;
            if (currentRowIndex >= document.querySelectorAll('.product-row').length) addProduct(); 
            const currentRow = document.querySelectorAll('.product-row')[currentRowIndex];
            
            const cells = line.split('\t');
            cells.forEach((cellValue, j) => {
                const targetColIndex = startColIndex + j;
                if (targetColIndex < colClasses.length) {
                    const input = currentRow.querySelector('.' + colClasses[targetColIndex]);
                    if (input) {
                        let val = cellValue.trim();
                        if (['p-qty', 'p-price', 'p-prQty'].includes(colClasses[targetColIndex])) {
                            val = val.replace(/,/g, '');
                        }
                        input.value = val;
                    }
                }
            });
        });
        calculateTotals();
    });

    document.getElementById('excelPaste').addEventListener('paste', function(e) {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        if (!pasteData) return;
        
        const rows = pasteData.split(/\r\n|\n|\r/).filter(r => r.trim() !== '');
        const existingRows = document.querySelectorAll('.product-row');
        if (existingRows.length === 1 && existingRows[0].querySelector('.p-name').value === '') {
            existingRows[0].remove(); 
        }
        
        rows.forEach(r => {
            const cols = r.split('\t');
            addProduct(
                cols[0] ? cols[0].trim() : '', 
                cols[1] ? cols[1].replace(/,/g,'').trim() : '', 
                cols[2] ? cols[2].replace(/,/g,'').trim() : '', 
                cols[3] ? cols[3].replace(/,/g,'').trim() : '',
                cols[4] ? cols[4].trim() : ''
            );
        });
        
        calculateTotals();
        
        const inputElement = this;
        inputElement.placeholder = "✅ 匯入成功！您可以繼續貼上追加資料...";
        setTimeout(() => { 
            inputElement.placeholder = "📋 多欄位快速匯入區：點擊此處按 Ctrl+V，支援整塊複製貼上"; 
        }, 3000);
    });

    function formatROCDate(dateString) {
        if (!dateString) return { year: "", month: "", day: "" };
        const parts = dateString.split('-');
        return { year: (parseInt(parts[0]) - 1911).toString(), month: parts[1].replace(/^0/, ''), day: parts[2].replace(/^0/, '') };
    }

    function calculateTotals() {
        let totalQty = 0, totalAmt = 0, itemCount = 0;
        const currentTaxRate = parseFloat(document.getElementById('taxRate').value || 0) / 100;

        document.querySelectorAll('.product-row').forEach(row => {
            const name = row.querySelector('.p-name').value.trim();
            const qty = parseInt(row.querySelector('.p-qty').value || 0);
            const price = parseInt(row.querySelector('.p-price').value || 0);
            
            if (name !== "" || qty > 0) itemCount++; 
            
            totalQty += qty; 
            totalAmt += (qty * price);
        });
        
        const tax = Math.round(totalAmt * currentTaxRate);
        const finalTotal = totalAmt + tax;
        
        document.getElementById('totalDisplay').innerHTML = `品項: <span class="text-primary">${itemCount}</span> 款 | 數量總計: <span class="text-primary">${totalQty}</span> | 未稅總計: <span class="text-primary">$${totalAmt.toLocaleString()}</span> | 營業稅: $${tax.toLocaleString()} | <span class='text-danger'>💰最低採購總金額(含稅): $${finalTotal.toLocaleString()}</span>`;
        return { totalQty, totalAmt, tax, finalTotal, itemCount };
    }
    calculateTotals();

    function addProduct(name='', qty='', price='', prQty='', date='') {
        const html = `<div class="row g-2 mb-3 align-items-end product-row pb-3 border-bottom"><div class="col-md-3"><input type="text" class="form-control p-name" placeholder="品項名稱" value="${name}" oninput="calculateTotals()"></div><div class="col-md-2"><input type="number" class="form-control p-qty" placeholder="數量" oninput="calculateTotals()" value="${qty}"></div><div class="col-md-2"><input type="number" class="form-control p-price" placeholder="單價" oninput="calculateTotals()" value="${price}"></div><div class="col-md-2"><input type="number" class="form-control p-prQty" placeholder="公關品數量" value="${prQty}"></div><div class="col-md-2"><input type="text" class="form-control p-date" placeholder="日期或文字" value="${date}"></div><div class="col-md-1 text-center"><span class="remove-btn" onclick="this.closest('.product-row').remove(); calculateTotals();">✖ 刪除</span></div></div>`;
        document.getElementById('productContainer').insertAdjacentHTML('beforeend', html);
    }

    async function generateContract() {
        const contractType = document.querySelector('input[name="contractType"]:checked').value;
        const eventName = document.getElementById('eventName').value || "活動名稱";

        const templateMap = {
            '711_return': '711_return.docx',
            '711_firm': '711_firm.docx'
        };
        const templateFileName = templateMap[contractType];

        try {
            const response = await fetch(templateFileName);
            if (!response.ok) {
                throw new Error(`找不到背景樣板檔案：${templateFileName}\n請確認您有將 Word 檔案跟網頁放在同一個資料夾，並且檔名正確！`);
            }
            
            const templateBuffer = await response.arrayBuffer();
            const zip = new PizZip(templateBuffer);

            const doc = new window.docxtemplater(zip, {
                paragraphLoop: true,
                linebreaks: true,
                delimiters: { start: '{{', end: '}}' }, 
                parser: function(tag) {
                    const cleanTag = tag.replace(/[\s\u200B-\u200D\uFEFF]+/g, '');
                    return {
                        get: function(scope, context) {
                            if (cleanTag === '.') return scope;
                            let result = undefined;
                            if (scope && typeof scope === 'object') {
                                for (let key in scope) {
                                    if (key.replace(/[\s\u200B-\u200D\uFEFF]+/g, '') === cleanTag) {
                                        if (scope[key] !== undefined && scope[key] !== null) { result = scope[key]; break; }
                                    }
                                }
                            }
                            if (result === undefined && window.GLOBAL_DOC_DATA) {
                                for (let key in window.GLOBAL_DOC_DATA) {
                                    if (key.replace(/[\s\u200B-\u200D\uFEFF]+/g, '') === cleanTag) {
                                        if (window.GLOBAL_DOC_DATA[key] !== undefined && window.GLOBAL_DOC_DATA[key] !== null) { result = window.GLOBAL_DOC_DATA[key]; break; }
                                    }
                                }
                            }
                            return result !== undefined ? result : "";
                        }
                    };
                }
            });

            const signD = formatROCDate(document.getElementById('signDate').value);
            const eventD = formatROCDate(document.getElementById('eventDate').value);

            const items = [];
            const pr_items = [];
            
            // 找出第一筆有填寫交貨日期的文字，作為合併儲存格的代表文字
            let globalDeliveryText = "";
            document.querySelectorAll('.product-row').forEach(row => {
                const d = row.querySelector('.p-date').value.trim();
                if (d !== "" && globalDeliveryText === "") {
                    globalDeliveryText = d;
                }
            });
            
            let isFirstRow = true;

            document.querySelectorAll('.product-row').forEach(row => {
                const name = row.querySelector('.p-name').value || "";
                const qty = parseInt(row.querySelector('.p-qty').value || 0);
                const price = parseInt(row.querySelector('.p-price').value || 0);
                const prQty = parseInt(row.querySelector('.p-prQty').value || 0);
                
                if (name === "" && qty === 0 && price === 0) return;

                const itemData = {
                    "品項": name,
                    "數量": qty || "0",
                    "單價": price || "0",
                    "總計": (qty * price) > 0 ? (qty * price).toLocaleString() : "0",
                    "首批交貨日": isFirstRow ? globalDeliveryText : "" // 第一筆印文字，其餘為空
                };
                items.push(itemData);
                isFirstRow = false; 
                
                if (prQty > 0) {
                    pr_items.push({
                        "品項": name,
                        "數量": prQty
                    });
                }
            });

            const totals = calculateTotals();

            window.GLOBAL_DOC_DATA = {
                "活動名稱": eventName,
                "品項款數": totals.itemCount,
                "簽約年": signD.year, "簽約月": signD.month, "簽約日": signD.day,
                "活動年": eventD.year, "活動月": eventD.month, "活動日": eventD.day,
                "items": items,
                "pr_items": pr_items,
                "數量總計": totals.totalQty || "0",
                "金額總計": totals.totalAmt > 0 ? totals.totalAmt.toLocaleString() : "0",
                "營業稅": totals.tax > 0 ? totals.tax.toLocaleString() : "0",
                "合計金額": totals.finalTotal > 0 ? totals.finalTotal.toLocaleString() : "0",
                "總金額": totals.finalTotal > 0 ? totals.finalTotal.toLocaleString() : "0"
            };

            doc.render(window.GLOBAL_DOC_DATA);

            const out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });

            let finalFileName = "7-11買賣合約書.docx";
            if (contractType === '711_return') {
                finalFileName = `711_全店制式買賣合約書_可收退_${eventName}.docx`;
            } else if (contractType === '711_firm') {
                finalFileName = `711_全店制式買賣合約書_firm sale_${eventName}.docx`;
            }

            saveAs(out, finalFileName);

        } catch (error) {
            console.error(error);
            alert("🚨 發生錯誤！\n\n" + error.message);
        }
    }
</script>

</body>
</html>
